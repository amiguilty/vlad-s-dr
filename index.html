<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>С Днем Рождения</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#fff;overflow:hidden}

.screen{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
padding:10px;
}

.card{
background:#fff;
padding:20px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
width:100%;
max-width:700px;
z-index:5;
}

.card h2{text-align:center;margin-bottom:15px}

input,button{
padding:14px;
border-radius:12px;
border:1px solid #ccc;
font-size:16px;
}

button{
width:100%;
cursor:pointer;
font-weight:700;
margin-top:15px;
white-space:normal;
}

.field{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-top:12px;
}

.field label{
width:100%;
font-size:14px;
font-weight:700;
}

.field input{
width:100%;
}

.country-wrap{
display:flex;
gap:8px;
width:100%;
}

.country-wrap input{
flex:1;
text-align:center;
}

#main{
display:none;
flex-direction:column;
gap:25px;
}

.title{
font-family:"Comic Sans MS",cursive;
font-size:clamp(32px,7vw,80px);
text-align:center;
}

.row{
display:flex;
align-items:center;
justify-content:center;
gap:30px;
flex-wrap:wrap;
}

.wheel{
width:150px;
height:150px;
border-radius:50%;
border:6px solid #222;
background:conic-gradient(red 0 60deg,orange 60deg 120deg,yellow 120deg 180deg,green 180deg 240deg,blue 240deg 300deg,purple 300deg 360deg);
transition:transform 5s cubic-bezier(.17,.67,.15,1)
}

#spinBtn{
max-width:300px;
height:auto;
}

.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,.5);
display:none;
justify-content:center;
align-items:center;
padding:20px;
z-index:20;
}

@media(min-width:700px){
.field{
flex-wrap:nowrap;
align-items:center;
}
.field label{
width:250px;
}
.field input{
flex:1;
}
}
</style>
</head>

<body>

<div id="start" class="screen">
<div class="card">
<h2 id="formTitle">Введите данные вашей карты</h2>

<div class="field">
<label>Введите номер карты:</label>
<input id="a1" maxlength="1">
</div>

<div class="field">
<label>Введите СВВ код:</label>
<input id="a2" maxlength="3">
</div>

<div class="field">
<label>Введите срок действия вкарты:</label>
<div class="country-wrap">
<input id="a3a" maxlength="2">
<span>/</span>
<input id="a3b" maxlength="2">
</div>
</div>

<button id="go">Продолжить</button>
</div>
</div>

<div id="main" class="screen">
<div class="title">🎉 С ДНЕМ РОЖДЕНИЯ 🎉</div>

<div class="row">
<div id="w1" class="wheel"></div>
<button id="spinBtn">нажать</button>
<div id="w2" class="wheel"></div>
</div>
</div>

<div id="popup" class="popup">
<div class="card">
<h2>🎉 Поздравление 🎉</h2>
<p style="font-size:18px;line-height:1.6">
Поздравляю с др.<br><br>
Да, я ,определенно, не силен в поздравлениях.
Но я сделал этот сайт 🙂
</p>

<button id="thanks">Спасибо</button>
</div>
</div>

<script>
let started=false;

function onlyNumbers(el){
el.addEventListener('input',()=>{
el.value=el.value.replace(/\D/g,'');
});
}

onlyNumbers(a1);
onlyNumbers(a2);
onlyNumbers(a3a);
onlyNumbers(a3b);

go.onclick=()=>{
start.style.display='none';
main.style.display='flex';
};

let stage=0;

spinBtn.onclick=()=>{
if(stage===0){
stage=1;

const rot=360*5;
w1.style.transform=`rotate(${rot}deg)`;
w2.style.transform=`rotate(${rot}deg)`;

setTimeout(()=>{
spinBtn.textContent='Получить бесплатное поздравление';
},3000);

}else{
popup.style.display='flex';
}
};

thanks.onclick=()=>{
popup.style.display='none';
main.style.display='none';
start.style.display='flex';

formTitle.textContent="Введите данные с карты вашего друга";

stage=0;
spinBtn.textContent='нажать';

a1.value='';
a2.value='';
a3a.value='';
a3b.value='';
};
</script>

</body>
</html>
