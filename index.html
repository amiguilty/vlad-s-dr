<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>🎁</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#eee;
}

.wrap{
  max-width:700px;
  margin:60px auto;
  background:#fff;
  padding:40px;
  border-radius:25px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h2{
  text-align:center;
  margin-bottom:40px;
}

.field{
  margin-bottom:25px;
}

label{
  display:block;
  margin-bottom:8px;
  font-size:18px;
}

input{
  width:100%;
  padding:18px;
  font-size:18px;
  border-radius:15px;
  border:2px solid #ccc;
  outline:none;
}

input:focus{
  border-color:#3b82f6;
}

button{
  width:100%;
  padding:18px;
  font-size:18px;
  border:none;
  border-radius:15px;
  margin-top:20px;
  background:#3b82f6;
  color:#fff;
  cursor:pointer;
}

button:disabled{
  background:#aaa;
  cursor:not-allowed;
}

/* POPUP */
#popup{
  display:none;
  text-align:center;
  margin-top:100px;
}

#popup p{
  font-size:22px;
  max-width:600px;
  margin:20px auto;
}
</style>
</head>

<body>

<div class="wrap" id="main">

<h2>Введите данные карты (на всякий случай)</h2>

<div class="field">
<label>Введите срок действия карты:</label>
<input id="date" maxlength="5" placeholder="MM/YY">
</div>

<div class="field">
<label>Введите CVV код:</label>
<input id="cvv">
</div>

<div class="field">
<label>Введите номер карты:</label>
<input id="card">
</div>

<button id="go" disabled>Продолжить</button>

</div>


<!-- POPUP -->
<div id="popup">
<h1>🎉</h1>

<p>
Поздравляю с др.<br><br>
Мне всегда сложно с поздравлениями на др, поэтому я решил поздравить не словом, а делом.<br>
Я сделал этот сайт вместо обычного поздравления xD
</p>

<button id="thanksBtn">Спасибо</button>
</div>


<!-- AUDIO -->
<audio id="intro" src="intro.mp3" loop></audio>
<audio id="happy" src="happy.mp3"></audio>


<script>

let date = document.getElementById('date');
let cvv = document.getElementById('cvv');
let card = document.getElementById('card');
let go = document.getElementById('go');

let popup = document.getElementById('popup');
let thanksBtn = document.getElementById('thanksBtn');
let main = document.getElementById('main');

let intro = document.getElementById('intro');
let happy = document.getElementById('happy');


// 🔥 запуск музыки (только после клика — важно)
document.body.addEventListener('click', ()=>{
  intro.play().catch(()=>{});
}, { once:true });


// =====================
// DATE MM/YY
// =====================
date.addEventListener('input',()=>{
  let v = date.value.replace(/\D/g,'').slice(0,4);

  if(v.length >= 3){
    v = v.slice(0,2) + '/' + v.slice(2);
  }

  date.value = v;

  if(v.length === 5){
    cvv.focus();
  }

  checkForm();
});


// =====================
// CVV
// =====================
cvv.addEventListener('input',()=>{
  cvv.value = cvv.value.replace(/\D/g,'').slice(0,3);

  if(cvv.value.length === 3){
    card.focus();
  }

  checkForm();
});


// =====================
// CARD
// =====================
card.addEventListener('input',()=>{
  let v = card.value.replace(/\D/g,'').slice(0,16);
  v = v.replace(/(.{4})/g,'$1 ').trim();
  card.value = v;

  checkForm();
});


// =====================
// VALIDATION
// =====================
function checkForm(){
  if(
    date.value.length === 5 &&
    cvv.value.length === 3 &&
    card.value.replace(/\s/g,'').length === 16
  ){
    go.disabled = false;
  } else {
    go.disabled = true;
  }
}


// =====================
// GO
// =====================
go.onclick=()=>{
  main.style.display='none';
  popup.style.display='block';

  intro.pause();
  intro.currentTime = 0;

  happy.play().catch(()=>{});
};


// =====================
// THANKS
// =====================
thanksBtn.onclick=()=>{
  happy.pause();
  happy.currentTime = 0;

  intro.play().catch(()=>{});

  popup.style.display='none';
  main.style.display='block';

  date.value='';
  cvv.value='';
  card.value='';

  go.disabled=true;
};

</script>

</body>
</html>
