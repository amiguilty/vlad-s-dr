<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>С Днем Рождения</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#fff;overflow:hidden}

.screen{position:fixed;inset:0;display:flex;justify-content:center;align-items:center;padding:15px}

.card{
background:#fff;
padding:20px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
width:min(95vw,900px);
z-index:5;
}

.card h2{text-align:center;margin-bottom:20px;font-size:clamp(28px,4vw,52px)}

input,button{
padding:14px;
border-radius:12px;
border:1px solid #ccc;
font-size:18px;
}

button{
width:100%;
cursor:pointer;
font-weight:700;
margin-top:15px;
}

.form-card{position:relative;z-index:5}

.field{
display:flex;
align-items:center;
gap:12px;
margin-top:18px;
}

.field label{
width:320px;
font-size:clamp(16px,2vw,22px);
font-weight:700;
}

.field input{
flex:1;
min-width:0;
}

.country-wrap{
display:flex;
align-items:center;
gap:8px;
width:100%;
}

.country-wrap input{
width:100%;
text-align:center;
}

.bg-form,.bg{
position:fixed;
inset:0;
pointer-events:none;
overflow:hidden;
}

.form-currency,.currency{
position:absolute;
color:#d4af37;
font-weight:900;
user-select:none;
}

.form-currency{opacity:.12}
.currency{opacity:.22}

#main{
display:none;
flex-direction:column;
gap:25px;
}

.title{
font-family:"Comic Sans MS",cursive;
font-size:clamp(36px,8vw,92px);
text-align:center;
transform:rotate(-2deg);
text-shadow:3px 3px 0 #ffd700;
z-index:2;
}

.row{
display:flex;
align-items:center;
justify-content:center;
gap:40px;
flex-wrap:wrap;
z-index:2;
}

.wblock{text-align:center}

.pointer{
width:0;height:0;
border-left:14px solid transparent;
border-right:14px solid transparent;
border-top:28px solid #222;
margin:auto;
}

.wheel{
width:200px;height:200px;
border-radius:50%;
border:6px solid #222;
background:conic-gradient(red 0 60deg,orange 60deg 120deg,yellow 120deg 180deg,green 180deg 240deg,blue 240deg 300deg,purple 300deg 360deg);
transition:transform 5s cubic-bezier(.17,.67,.15,1)
}

#spinBtn{
width:260px;
max-width:90vw;
height:80px;
background:#bdbdbd;
border:none;
font-size:26px;
transition:.4s;
}

.ready{
background:linear-gradient(90deg,#d4af37,#ffd700)!important;
transform:scale(1.15);
animation:pulse 1s infinite;
}

@keyframes pulse{50%{transform:scale(1.22)}}

.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,.5);
display:none;
justify-content:center;
align-items:center;
padding:20px;
z-index:20;
}

.confetti{position:fixed;top:-20px;z-index:15}

@media(max-width:700px){
body{overflow:auto}
.card{padding:16px}
.field{flex-direction:column;align-items:stretch}
.field label{width:auto}
.wheel{width:140px;height:140px}
#spinBtn{height:70px;font-size:20px}
input,button{font-size:16px}
}
</style>
</head>
<body>

<div id="start" class="screen">
<div class="bg-form" id="bgForm"></div>

<div class="card form-card">
<h2 id="formTitle">Введите данные вашей карты</h2>

<div class="field">
<label>Введите номер карты:</label>
<input id="a1" maxlength="19" placeholder="1234 5678 9012 3456">
</div>

<div class="field">
<label>Введите срок действия карты:</label>
<div class="country-wrap">
<input id="a2a" maxlength="2" placeholder="MM">
<span>/</span>
<input id="a2b" maxlength="2" placeholder="YY">
</div>
</div>

<div class="field">
<label>Введите СВВ код:</label>
<input id="a3" maxlength="3">
</div>

<button id="go" disabled>Продолжить</button>
</div>
</div>

<div id="main" class="screen">
<div class="bg" id="bg"></div>
<div class="title">🎉 С ДНЕМ РОЖДЕНИЯ 🎉</div>

<div class="row">
<div class="wblock"><div class="pointer"></div><div id="w1" class="wheel"></div></div>
<button id="spinBtn">нажать</button>
<div class="wblock"><div class="pointer"></div><div id="w2" class="wheel"></div></div>
</div>
</div>

<div id="popup" class="popup">
<div class="card">
<h2>🎉 Поздравление 🎉</h2>

<p style="font-size:22px;line-height:1.6">
Поздравляю с др.<br><br>
Да, я определенно не силен в поздравлениях. Мне всегда дается это тяжело.
По-этому я выбрал вариант поздравления действием, сделав такой сайт-прикол,
думаю это не хуже обычного поздравления!!
</p>

<button id="thanksBtn">Спасибо</button>
</div>
</div>

<script>
let started=false;
let friendCounter=0;

function formatCardNumber(value){
value=value.replace(/\D/g,'').substring(0,16);
return value.replace(/(\d{4})(?=\d)/g,'$1 ');
}

function onlyNumbers(el,next=null,formatter=null){
el.addEventListener('input',()=>{
if(formatter){
el.value=formatter(el.value);
}else{
el.value=el.value.replace(/\D/g,'');
}

if(next && el.value.replace(/\D/g,'').length===16){
next.focus();
}

checkForm();
});
}

onlyNumbers(a1,a3,formatCardNumber);
onlyNumbers(a2a);
onlyNumbers(a2b);
onlyNumbers(a3);

function checkForm(){
go.disabled = !(
a1.value.replace(/\s/g,'').length===16 &&
a2a.value.length===2 &&
a2b.value.length===2 &&
a3.value.length===3
);
}

go.onclick=()=>{
start.style.display='none';
main.style.display='flex';
};

let stage=0;

spinBtn.onclick=()=>{
if(stage===0){
stage=1;

const sector=Math.floor(Math.random()*6);
const center=sector*60+30;
const rot=(360*8)+(360-center);

w1.style.transform=`rotate(${rot}deg)`;
w2.style.transform=`rotate(${rot}deg)`;

setTimeout(()=>{
spinBtn.classList.add('ready');
spinBtn.textContent='получить бесплатное поздравление';
},5000);

}else{
popup.style.display='flex';
}
};

thanksBtn.onclick=()=>{
popup.style.display='none';

friendCounter++;

document.getElementById('formTitle').textContent =
friendCounter===0
? 'Введите данные вашей карты'
: 'Введите данные карты вашего друга';

start.style.display='flex';
main.style.display='none';

a1.value='';
a2a.value='';
a2b.value='';
a3.value='';

go.disabled=true;

stage=0;
spinBtn.classList.remove('ready');
spinBtn.textContent='нажать';

w1.style.transform='rotate(0deg)';
w2.style.transform='rotate(0deg)';
};
</script>
</body>
</html>
