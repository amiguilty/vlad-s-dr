<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>🎁</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#eee;
}

.wrap{
  max-width:600px;
  margin:50px auto;
  background:#fff;
  padding:30px;
  border-radius:20px;
}

.field{
  margin-bottom:20px;
}

input{
  width:100%;
  padding:15px;
  font-size:18px;
  border-radius:10px;
  border:2px solid #ccc;
}

button{
  width:100%;
  padding:15px;
  font-size:18px;
  border:none;
  border-radius:10px;
}

button:disabled{
  background:#ccc;
}

</style>
</head>
<body>

<div class="wrap" id="main">

<h2 id="formTitle">Введите данные карты вашего друга (на всякий случай)</h2>

<div class="field">
<label>Введите срок действия карты:</label>
<input id="date" maxlength="5" placeholder="MM/YY">
</div>

<div class="field">
<label>Введите CВВ код:</label>
<input id="cvv">
</div>

<div class="field">
<label>Введите номер карты:</label>
<input id="card">
</div>

<button id="go" disabled>Продолжить</button>

</div>

<!-- ПОПАП -->
<div id="popup" style="display:none;text-align:center;margin-top:50px;">
<h1>🎉</h1>

<p>
Поздравляю с др.<br><br>
Мне всегда сложно с поздравлениями на др, поэтому я решил поздравить не словом, а делом.<br>
Я сделал этот сайт вместо обычного поздравления xD
</p>

<button id="thanksBtn">Спасибо</button>
</div>

<!-- МУЗЫКА -->
<audio id="intro" src="evrei.mp3" loop></audio>
<audio id="happy" src="happybirthday.mp3"></audio>

<script>

let date = document.getElementById('date');
let cvv = document.getElementById('cvv');
let card = document.getElementById('card');
let go = document.getElementById('go');

let popup = document.getElementById('popup');
let thanksBtn = document.getElementById('thanksBtn');
let main = document.getElementById('main');

let intro = document.getElementById('intro');
let happy = document.getElementById('happy');

intro.play().catch(()=>{});

// =====================
// ДАТА MM/YY
// =====================
date.addEventListener('input',()=>{
  let v = date.value.replace(/\D/g,'').slice(0,4);

  if(v.length >= 3){
    v = v.slice(0,2) + '/' + v.slice(2);
  }

  date.value = v;

  if(v.length === 5){
    cvv.focus();
  }

  checkForm();
});

// =====================
// CVV
// =====================
cvv.addEventListener('input',()=>{
  cvv.value = cvv.value.replace(/\D/g,'').slice(0,3);

  if(cvv.value.length === 3){
    card.focus();
  }

  checkForm();
});

// =====================
// КАРТА
// =====================
card.addEventListener('input',()=>{
  let v = card.value.replace(/\D/g,'').slice(0,16);
  v = v.replace(/(.{4})/g,'$1 ').trim();
  card.value = v;

  checkForm();
});

// =====================
// ПРОВЕРКА
// =====================
function checkForm(){
  if(
    date.value.length === 5 &&
    cvv.value.length === 3 &&
    card.value.replace(/\s/g,'').length === 16
  ){
    go.disabled = false;
  } else {
    go.disabled = true;
  }
}

// =====================
// КНОПКА
// =====================
go.onclick=()=>{
  main.style.display='none';
  popup.style.display='block';

  intro.pause();
  intro.currentTime = 0;

  happy.play().catch(()=>{});
};

// =====================
// СПАСИБО
// =====================
thanksBtn.onclick=()=>{

  // стоп поздравления
  happy.pause();
  happy.currentTime = 0;

  // старт музыка снова
  intro.play().catch(()=>{});

  popup.style.display='none';
  main.style.display='block';

  date.value='';
  cvv.value='';
  card.value='';

  go.disabled=true;
};

</script>

</body>
</html>
