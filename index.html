<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>С Днем Рождения</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#fff;overflow:hidden}

.screen{position:fixed;inset:0;display:flex;justify-content:center;align-items:center}

.card{
background:#fff;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
width:min(95vw,700px);
z-index:5;
}

.field{display:flex;gap:12px;margin-top:12px;flex-direction:column}

input,button{
padding:14px;
border-radius:12px;
border:1px solid #ccc;
}

#spinBtn{
min-width:260px;
max-width:90vw;
padding:20px 30px;
height:auto;
font-size:26px;
white-space:normal;
}

.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,.5);
display:none;
justify-content:center;
align-items:center;
}

</style>
</head>

<body>

<audio id="intro" src="evrei.mp3"></audio>
<audio id="happy" src="happybirthday.mp3" loop></audio>

<div id="start" class="screen">
<div class="card form-card">
<h2>Введите данные вашей карты</h2>

<div class="field">
<label>Введите номер карты:</label>
<input id="a1" maxlength="19" placeholder="1234 5678 9012 3456">
</div>

<div class="field">
<label>Введите срок действия карты:</label>
<input id="a2a" maxlength="2" placeholder="MM">
<input id="a2b" maxlength="2" placeholder="YY">
</div>

<div class="field">
<label>Введите СВВ код:</label>
<input id="a3" maxlength="3">
</div>

<button id="go" disabled>Продолжить</button>
</div>
</div>

<div id="main" class="screen" style="display:none;">
<button id="spinBtn">нажать</button>
</div>

<div id="popup" class="popup">
<div class="card">
<h2>🎉 Поздравление 🎉</h2>

<p style="font-size:20px">
Поздравляю с др.<br><br>
Это сайт-прикол 😄
</p>

<button id="thanksBtn">Спасибо</button>
</div>
</div>

<script>
let started=false;

function formatCardNumber(value){
let digits = value.replace(/\D/g,'').substring(0,16);
return digits.replace(/(\d{4})(?=\d)/g,'$1 ');
}

function onlyNumbers(el,next=null,formatter=null){
el.addEventListener('input',()=>{

if(formatter){
el.value=formatter(el.value);
}else{
el.value=el.value.replace(/\D/g,'');
}

if(next && el.value.replace(/\D/g,'').length===el.maxLength){
next.focus();
}

checkForm();
});
}

onlyNumbers(a1,a2a,formatCardNumber);
onlyNumbers(a2a,a2b);
onlyNumbers(a2b,a3);
onlyNumbers(a3);

function checkForm(){
if(
a1.value.replace(/\s/g,'').length===16 &&
a2a.value.length===2 &&
a2b.value.length===2 &&
a3.value.length===3
){
go.disabled=false;
}else{
go.disabled=true;
}
}

go.onclick=()=>{
start.style.display='none';
main.style.display='flex';
spinBtn.innerHTML='получить<br>бесплатное поздравление';
};

spinBtn.onclick=()=>{
popup.style.display='flex';
};

thanksBtn.onclick=()=>{
popup.style.display='none';
main.style.display='none';
start.style.display='flex';

document.querySelector('.form-card h2').textContent=
'Введите данные карты вашего друга (на всякий случай)';

a1.value='';
a2a.value='';
a2b.value='';
a3.value='';
go.disabled=true;
};
</script>

</body>
</html>
