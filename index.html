<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Форма карты</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    padding: 40px;
}

.container {
    max-width: 500px;
    margin: auto;
}

input {
    width: 100%;
    padding: 15px;
    margin: 10px 0;
    font-size: 18px;
    border-radius: 12px;
    border: 1px solid #ccc;
    box-sizing: border-box;
}

.row {
    display: flex;
    gap: 10px;
}

button {
    padding: 15px 25px;
    font-size: 18px;
    border-radius: 12px;
    border: none;
    background: #ddd;
    cursor: not-allowed;
}

button.active {
    background: gold;
    cursor: pointer;
}

.popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    padding: 30px;
    border-radius: 20px;
    display: none;
}
</style>
</head>

<body>

<div class="container">

<h1 id="title">Введите данные вашей карты</h1>

<label>Введите номер карты:</label>
<input type="text" id="card" placeholder="1234 5678 9012 3456" maxlength="19">

<label>Введите срок действия карты:</label>
<div class="row">
    <input type="text" id="month" placeholder="MM" maxlength="2">
    <input type="text" id="year" placeholder="YY" maxlength="2">
</div>

<label>Введите CVV код:</label>
<input type="text" id="cvv" maxlength="3">

<button id="btn">Продолжить</button>

</div>

<div class="popup" id="popup">
    <h2>🎉 Поздравление 🎉</h2>
    <p>Поздравляю с др.</p>
    <button onclick="closePopup()">Спасибо</button>
</div>

<script>
const card = document.getElementById('card');
const month = document.getElementById('month');
const year = document.getElementById('year');
const cvv = document.getElementById('cvv');
const btn = document.getElementById('btn');
const popup = document.getElementById('popup');
const title = document.getElementById('title');

// Маска карты
card.addEventListener('input', (e) => {
    let value = e.target.value.replace(/\D/g, '').substring(0,16);
    let formatted = value.match(/.{1,4}/g);
    e.target.value = formatted ? formatted.join(' ') : value;
    check();
});

// MM → YY автопрыжок
month.addEventListener('input', () => {
    month.value = month.value.replace(/\D/g, '');
    if (month.value.length === 2) {
        year.focus();
    }
    check();
});

year.addEventListener('input', () => {
    year.value = year.value.replace(/\D/g, '');
    check();
});

cvv.addEventListener('input', () => {
    cvv.value = cvv.value.replace(/\D/g, '');
    check();
});

// активация кнопки
function check() {
    if (card.value.length === 19 && month.value.length === 2 && year.value.length === 2 && cvv.value.length === 3) {
        btn.classList.add('active');
        btn.disabled = false;
    } else {
        btn.classList.remove('active');
        btn.disabled = true;
    }
}

// popup
btn.addEventListener('click', () => {
    popup.style.display = 'block';
});

// закрытие
function closePopup() {
    popup.style.display = 'none';
    title.innerText = "Введите данные карты вашего друга (на всякий случай)";
}
</script>

</body>
</html>
