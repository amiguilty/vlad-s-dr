<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>С Днем Рождения</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#fff;overflow:hidden}
.screen{position:fixed;inset:0;display:flex;justify-content:center;align-items:center}
.card{background:#fff;padding:30px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,.15);width:min(92vw,520px);z-index:5}
.card h2{text-align:center;margin-bottom:15px}
input,button{width:100%;padding:14px;margin-top:10px;border-radius:12px;border:1px solid #ccc}
button{cursor:pointer;font-weight:700}
#main{display:none;flex-direction:column;gap:25px}
.bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.currency{position:absolute;color:#d4af37;opacity:.22;font-weight:900}
.title{
font-family:"Comic Sans MS",cursive;
font-size:clamp(42px,8vw,92px);
text-align:center;
transform:rotate(-2deg);
text-shadow:3px 3px 0 #ffd700;
}
.row{display:flex;align-items:center;justify-content:center;gap:25px;flex-wrap:wrap;z-index:2}
.wblock{text-align:center}
.pointer{width:0;height:0;border-left:14px solid transparent;border-right:14px solid transparent;border-top:28px solid #222;margin:auto}
.wheel{width:200px;height:200px;border-radius:50%;border:6px solid #222;
background:conic-gradient(red 0 60deg,orange 60deg 120deg,yellow 120deg 180deg,green 180deg 240deg,blue 240deg 300deg,purple 300deg 360deg);
transition:transform 5s cubic-bezier(.17,.67,.15,1)}
#spinBtn{width:320px;max-width:90vw;height:80px;background:#bdbdbd;border:none;font-size:26px;transition:.4s}
.ready{background:linear-gradient(90deg,#d4af37,#ffd700)!important;transform:scale(1.15);animation:pulse 1s infinite}
@keyframes pulse{50%{transform:scale(1.22)}}
.popup{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;justify-content:center;align-items:center;padding:20px;z-index:20}
.confetti{position:fixed;top:-20px;width:10px;height:14px;z-index:15}
@media(max-width:700px){
.wheel{width:150px;height:150px}
#spinBtn{height:72px;font-size:22px}
}
</style>
</head>
<body>

<audio id="intro" src="gimn-ror.mp3"></audio>
<audio id="happy" src="happy-birthday.mp3" loop></audio>

<div id="start" class="screen">
<div class="card">
<h2>Введите ответы</h2>
<input id="a1" placeholder="скольько 2+2 будет:">
<input id="a2" placeholder="Введите дату постройки эмпай стейт:">
<input id="a3" placeholder="введите количество стран в мире:">
<button id="go">Продолжить</button>
</div>
</div>

<div id="main" class="screen">
<div class="bg" id="bg"></div>
<div class="title">🎉 С ДНЕМ РОЖДЕНИЯ 🎉</div>
<div class="row">
<div class="wblock"><div class="pointer"></div><div id="w1" class="wheel"></div></div>
<button id="spinBtn">нажать</button>
<div class="wblock"><div class="pointer"></div><div id="w2" class="wheel"></div></div>
</div>
</div>

<div id="popup" class="popup">
<div class="card">
<h2>🎉 Поздравление 🎉</h2>
<p style="font-size:22px;line-height:1.6">
Поздравляю с др.<br><br>
Да, я определенно не силен в поздравлениях. Мне всегда дается это тяжело.
По-этому я выбрал вариант поздравления действием, сделав такой сайт-прикол,
думаю это не хуже обычного поздравления!!
</p>
</div>
</div>

<script>
let started=false;
const intro=intro=document.getElementById('intro');
['a1','a2','a3'].forEach(id=>{
document.getElementById(id).addEventListener('input',()=>{
if(!started){started=true;intro.play().catch(()=>{});}
});
});

go.onclick=()=>{
intro.pause();intro.currentTime=0;
start.style.display='none';
main.style.display='flex';
happy.play().catch(()=>{});

const s=['₿','Ξ','$','€','£','¥','₽','₴'];
for(let i=0;i<100;i++){
let d=document.createElement('div');
d.className='currency';
d.textContent=s[Math.floor(Math.random()*s.length)];
d.style.left=Math.random()*100+'vw';
d.style.top=Math.random()*100+'vh';
d.style.fontSize=(14+Math.random()*24)+'px';
bg.appendChild(d);
}
};

let stage=0,conf=false;

spinBtn.onclick=()=>{
if(stage===0){
stage=1;conf=true;confetti();
const sector=Math.floor(Math.random()*6);
const center=sector*60+30;
const rot=(360*8)+(360-center);
w1.style.transform=`rotate(${rot}deg)`;
w2.style.transform=`rotate(${rot}deg)`;

setTimeout(()=>{
conf=false;
spinBtn.classList.add('ready');
spinBtn.textContent='получить бесплатное поздравление';
},5000);
}else{
popup.style.display='flex';
}
};

function confetti(){
const t=setInterval(()=>{
if(!conf){clearInterval(t);return;}
for(let i=0;i<12;i++){
let c=document.createElement('div');
c.className='confetti';
c.style.left=Math.random()*100+'vw';
c.style.background=['red','blue','yellow','green','purple'][Math.floor(Math.random()*5)];
document.body.appendChild(c);
let d=2000+Math.random()*1000;
c.animate([{transform:'translateY(0)'},{transform:'translateY(110vh) rotate(720deg)'}],{duration:d});
setTimeout(()=>c.remove(),d);
}
},120);
}
</script>
</body>
</html>
