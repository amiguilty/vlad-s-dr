<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>С Днем Рождения</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#fff;overflow:hidden}

.screen{position:fixed;inset:0;display:flex;justify-content:center;align-items:center}

.card{
background:#fff;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
width:min(95vw,700px);
z-index:5}

.card h2{text-align:center;margin-bottom:15px}

input,button{
padding:14px;
border-radius:12px;
border:1px solid #ccc}

button{
width:100%;
cursor:pointer;
font-weight:700;
margin-top:15px}

.form-card{position:relative;z-index:5}

.field{
display:flex;
align-items:center;
gap:12px;
margin-top:12px}

.field label{
width:250px;
font-size:14px;
font-weight:700}

.field input{
flex:1}

.country-wrap{
display:flex;
align-items:center;
gap:8px;
width:100%}

.country-wrap input{
width:70px;
text-align:center}

.bg-form,.bg{
position:fixed;
inset:0;
pointer-events:none;
overflow:hidden}

.form-currency,
.currency{
position:absolute;
color:#d4af37;
font-weight:900;
user-select:none}

.form-currency{
opacity:.12}

.currency{
opacity:.22}

#main{
display:none;
flex-direction:column;
gap:25px}

.title{
font-family:"Comic Sans MS",cursive;
font-size:clamp(42px,8vw,92px);
text-align:center;
transform:rotate(-2deg);
text-shadow:3px 3px 0 #ffd700;
z-index:2}

.row{
display:flex;
align-items:center;
justify-content:center;
gap:70px;
flex-wrap:wrap;
z-index:2}

.wblock{text-align:center}

.pointer{
width:0;
height:0;
border-left:14px solid transparent;
border-right:14px solid transparent;
border-top:28px solid #222;
margin:auto}

.wheel{
width:200px;
height:200px;
border-radius:50%;
border:6px solid #222;
background:conic-gradient(red 0 60deg,orange 60deg 120deg,yellow 120deg 180deg,green 180deg 240deg,blue 240deg 300deg,purple 300deg 360deg);
transition:transform 5s cubic-bezier(.17,.67,.15,1)}

#spinBtn{
width:320px;
max-width:90vw;
height:80px;
background:#bdbdbd;
border:none;
font-size:24px;
padding:10px 15px;
white-space:normal;
line-height:1.2;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
transition:.4s}

.ready{
background:linear-gradient(90deg,#d4af37,#ffd700)!important;
font-size:18px !important;
transform:scale(1.15);
animation:pulse 1s infinite}

@keyframes pulse{
50%{transform:scale(1.22)}
}

.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,.5);
display:none;
justify-content:center;
align-items:center;
padding:20px;
z-index:20}

#thankYouBtn {
background:linear-gradient(90deg, #4caf50, #81c784);
color:#fff;
border:none;
font-size:20px;
transition:.3s;
margin-top:25px}

#thankYouBtn:hover {
transform:scale(1.02);
background:linear-gradient(90deg, #43a047, #66bb6a)}

.confetti{
position:fixed;
top:-20px;
z-index:15}

@media(max-width:700px){
.field{
flex-direction:column;
align-items:flex-start}
.field label{
width:auto}
.wheel{width:150px;height:150px}
#spinBtn{height:75px;font-size:20px}
.ready{font-size:16px !important}
}
</style>
</head>
<body>

<audio id="intro" src="evrei.mp3"></audio>
<audio id="happy" src="happybirthday.mp3" loop></audio>
<audio id="zvuk" src="zvuk.mp3"></audio>

<div id="start" class="screen">
<div class="bg-form" id="bgForm"></div>

<div class="card form-card">
<h2 id="formTitle">Введите данные вашей карты</h2>

<div class="field">
<label>Введите номер карты:</label>
<input id="a1" maxlength="19" placeholder="1234 5678 9012 3456" inputmode="numeric">
</div>

<div class="field">
<label>Введите срок действия карты:</label>
<div class="country-wrap">
<input id="a2a" maxlength="2" placeholder="MM" inputmode="numeric">
<span>/</span>
<input id="a2b" maxlength="2" placeholder="YY" inputmode="numeric">
</div>
</div>

<div class="field">
<label>Введите СВВ код:</label>
<input id="a3" maxlength="3" inputmode="numeric">
</div>

<button id="go" disabled>Продолжить</button>
</div>
</div>

<div id="main" class="screen">
<div class="bg" id="bg"></div>
<div class="title">🎉 С ДНЕМ РОЖДЕНИЯ 🎉</div>

<div class="row">
<div class="wblock"><div class="pointer"></div><div id="w1" class="wheel"></div></div>
<button id="spinBtn">нажать</button>
<div class="wblock"><div class="pointer"></div><div id="w2" class="wheel"></div></div>
</div>
</div>

<div id="popup" class="popup">
<div class="card">
<h2>🎉 Поздравление 🎉</h2>
<p style="font-size:22px;line-height:1.6">
Поздравляю с др.<br><br>
Да, я определенно не силен в поздравлениях. Мне всегда дается это тяжело.
По-этому я выбрал вариант поздравления действием, сделав такой сайт-прикол,
думаю это не хуже обычного поздравления!!
</p>
<button id="thankYouBtn">Спасибо!</button>
</div>
</div>

<script>
let started=false;

const intro = document.getElementById('intro');
const happy = document.getElementById('happy');
const zvuk = document.getElementById('zvuk');
const formTitle = document.getElementById('formTitle');

function formatCardNumber(value){
value = value.replace(/\D/g,'').substring(0,16);
return value.replace(/(\d{4})(?=\d)/g,'$1 ');
}

function onlyNumbers(el, next=null, formatter=null){
el.addEventListener('input',()=>{
if(formatter){
el.value = formatter(el.value);
}else{
el.value=el.value.replace(/\D/g,'');
}

if(!started){
started=true;
intro.play().catch(()=>{});
}

let currentLength = el.value.replace(/\s/g,'').length;
let targetLength = el === a1 ? 16 : parseInt(el.getAttribute('maxlength'));

if(next && currentLength === targetLength){
next.focus();
next.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

if(!next && el.value.length === 3) {
el.blur();
}

checkForm();
});
}

onlyNumbers(a1, a2a, formatCardNumber);
onlyNumbers(a2a, a2b);
onlyNumbers(a2b, a3);
onlyNumbers(a3);

function checkForm(){
if(
a1.value.replace(/\s/g,'').length === 16 &&
a2a.value.length === 2 &&
a2b.value.length === 2 &&
a3.value.length === 3
){
go.disabled = false;
}else{
go.disabled = true;
}
}

const bgForm=document.getElementById('bgForm');
const symbols=['$','€','£','¥','₽','₴','₿','Ξ'];

for(let i=0;i<60;i++){
const c=document.createElement('div');
c.className='form-currency';
c.textContent=symbols[Math.floor(Math.random()*symbols.length)];
c.style.left=Math.random()*100+'vw';
c.style.top=Math.random()*100+'vh';
c.style.fontSize=(24+Math.random()*50)+'px';
c.style.transform=`rotate(${Math.random()*40-20}deg)`;
bgForm.appendChild(c);
}

// Измененная логика кнопки Продолжить
go.onclick=()=>{
// Делаем кнопку временно некликнубельной, чтобы не спамить звуком
go.disabled = true;

intro.pause();
intro.currentTime=0;

// Запускаем звук zvuk.mp3
zvuk.play().catch(()=>{});

// Дожидаемся окончания проигрывания zvuk.mp3 перед переходом
zvuk.onended = () => {
start.style.display='none';
main.style.display='flex';

happy.play().catch(()=>{});

const s=['₿','Ξ','$','€','£','¥','₽','₴'];

bg.innerHTML = '';
for(let i=0;i<120;i++){
let d=document.createElement('div');
d.className='currency';
d.textContent=s[Math.floor(Math.random()*s.length)];
d.style.left=Math.random()*100+'vw';
d.style.top=Math.random()*100+'vh';
d.style.fontSize=(18+Math.random()*28)+'px';
d.style.transform=`rotate(${Math.floor(Math.random()*40-20)}deg)`;
bg.appendChild(d);
}
};
};

let stage=0,conf=false;

spinBtn.onclick=()=>{
if(stage===0){

stage=1;
conf=true;
confetti();

const sector=Math.floor(Math.random()*6);
const center=sector*60+30;
const rot=(360*8)+(360-center);

w1.style.transform=`rotate(${rot}deg)`;
w2.style.transform=`rotate(${rot}deg)`;

setTimeout(()=>{
conf=false;
spinBtn.classList.add('ready');
spinBtn.textContent='получить бесплатное поздравление';
},5000);

}else{
popup.style.display='flex';
}
};

document.getElementById('thankYouBtn').onclick = () => {
happy.pause();
happy.currentTime = 0;
zvuk.pause();
zvuk.currentTime = 0;

popup.style.display = 'none';
main.style.display = 'none';

start.style.display = 'flex';

formTitle.textContent = "Введите данные карты друга";

a1.value = '';
a2a.value = '';
a2b.value = '';
a3.value = '';
go.disabled = true;

w1.style.transform = 'rotate(0deg)';
w2.style.transform = 'rotate(0deg)';
spinBtn.classList.remove('ready');
spinBtn.textContent = 'нажать';

stage = 0;
started = false;
conf = false;
};

function confetti(){

const money=['💵','💶','💷','💴','🪙','💰'];

const t=setInterval(()=>{

if(!conf){
clearInterval(t);
return;
}

for(let i=0;i<14;i++){

const el=document.createElement('div');
el.className='confetti';

if(Math.random()>0.5){

el.style.background=['red','blue','yellow','green','purple'][Math.floor(Math.random()*5)];
el.style.width='10px';
el.style.height='14px';

}else{

el.textContent=money[Math.floor(Math.random()*money.length)];
el.style.fontSize='26px';

}

el.style.left=Math.random()*100+'vw';

document.body.appendChild(el);

const d=2000+Math.random()*1500;

el.animate(
[{transform:'translateY(0)'},{transform:'translateY(110vh) rotate(720deg)'}],
{duration:d}
);

setTimeout(()=>el.remove(),d);
}
},120);
}
</script>
</body>
</html>
