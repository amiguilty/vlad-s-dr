<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>С Днем Рождения</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#fff;overflow:hidden}

.screen{position:fixed;inset:0;display:flex;justify-content:center;align-items:center}

.card{
background:#fff;
padding:clamp(15px,4vw,30px);
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
width:min(95vw,700px);
z-index:5;
}

.card h2{text-align:center;margin-bottom:15px}

input,button{
padding:14px;
border-radius:12px;
border:1px solid #ccc;
font-size:16px;
}

button{
display:inline-block;
width:auto;
min-width:120px;
padding:14px 24px;
cursor:pointer;
font-weight:700;
margin-top:15px;
text-align:center;
}

button:disabled{
opacity:.5;
cursor:not-allowed;
}

.field{
display:flex;
align-items:center;
gap:12px;
margin-top:12px;
}

.field label{
width:250px;
font-size:14px;
font-weight:700;
}

.field input{flex:1}

.country-wrap{
display:flex;
align-items:center;
gap:8px;
width:100%;
}

.country-wrap input{
width:70px;
text-align:center;
}

#main{display:none;flex-direction:column;gap:25px}

.title{
font-family:"Comic Sans MS",cursive;
font-size:clamp(42px,8vw,92px);
text-align:center;
}

.row{
display:flex;
align-items:center;
justify-content:center;
gap:40px;
flex-wrap:wrap;
}

.pointer{
width:0;height:0;
border-left:14px solid transparent;
border-right:14px solid transparent;
border-top:28px solid #222;
margin:auto;
}

.wheel{
width:180px;height:180px;
border-radius:50%;
border:6px solid #222;
background:conic-gradient(red 0 60deg,orange 60deg 120deg,yellow 120deg 180deg,green 180deg 240deg,blue 240deg 300deg,purple 300deg 360deg);
transition:transform 5s cubic-bezier(.17,.67,.15,1)
}

#spinBtn{
max-width:90vw;
height:70px;
background:#bdbdbd;
border:none;
font-size:22px;
transition:.4s;
}

.ready{
background:gold!important;
transform:scale(1.1);
}

.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,.5);
display:none;
justify-content:center;
align-items:center;
padding:20px;
z-index:20;
}

@media(max-width:700px){
.field{flex-direction:column;align-items:flex-start}
.field label{width:auto}
}
</style>

</head>

<body>

<div id="start" class="screen">
<div class="card">

<h2>Введите данные карты</h2>

<div class="field">
<label>Введите номер карты:</label>
<input id="a1" maxlength="1">
</div>

<div class="field">
<label>Введите СВВ:</label>
<input id="a2" maxlength="4">
</div>

<div class="field">
<label>Введите дату истечения срока карты:</label>
<div class="country-wrap">
<input id="a3a" maxlength="2">
<span>/</span>
<input id="a3b" maxlength="2">
</div>
</div>

<div class="field">
<label>Дата карты:</label>
<input id="date" placeholder="MM/YY" maxlength="5">
</div>

<div class="field">
<label>CVV:</label>
<input id="cvv" maxlength="3">
</div>

<button id="go" disabled>Продолжить</button>

</div>
</div>

<div id="main" class="screen">
<div class="title">🎉 С ДНЕМ РОЖДЕНИЯ 🎉</div>

<div class="row">
<div>
<div class="pointer"></div>
<div id="w1" class="wheel"></div>
</div>

<button id="spinBtn">нажать</button>

<div>
<div class="pointer"></div>
<div id="w2" class="wheel"></div>
</div>
</div>
</div>

<div id="popup" class="popup">
<div class="card">
<h2>🎉 Поздравление 🎉</h2>
<p>Поздравляю 🎉</p>
<button id="thanksBtn">Спасибо</button>
</div>
</div>

<script>
const inputs = ['a1','a2','a3a','a3b','date','cvv'].map(id=>document.getElementById(id));
const go = document.getElementById('go');

function onlyNumbers(el){
el.addEventListener('input',()=>{
el.value = el.value.replace(/\D/g,'');
validate();
});
}

onlyNumbers(a1);
onlyNumbers(a2);
onlyNumbers(a3a);
onlyNumbers(a3b);
onlyNumbers(cvv);

// дата MM/YY
date.addEventListener('input',()=>{
let v = date.value.replace(/\D/g,'');

if(v.length>2){
v = v.slice(0,2)+'/'+v.slice(2,4);
}

date.value = v;
validate();
});

// валидация
function validate(){
const valid =
a1.value.length===1 &&
a2.value.length===4 &&
a3a.value.length>0 &&
a3b.value.length>0 &&
date.value.length===5 &&
cvv.value.length===3;

go.disabled = !valid;
}

// переход
go.onclick=()=>{
start.style.display='none';
main.style.display='flex';
};

// рулетка
let stage=0;

spinBtn.onclick=()=>{
if(stage===0){

stage=1;

const rot=360*5 + Math.random()*360;

w1.style.transform=`rotate(${rot}deg)`;
w2.style.transform=`rotate(${rot}deg)`;

setTimeout(()=>{
spinBtn.classList.add('ready');
spinBtn.textContent='получить поздравление';
},5000);

}else{
popup.style.display='flex';
}
};

// спасибо
thanksBtn.onclick=()=>{
popup.style.display='none';
main.style.display='none';
start.style.display='flex';

document.querySelector('h2').textContent =
'Введите данные с карты вашего друга';

inputs.forEach(i=>i.value='');
validate();

stage=0;
spinBtn.classList.remove('ready');
spinBtn.textContent='нажать';
};
</script>

</body>
</html>
